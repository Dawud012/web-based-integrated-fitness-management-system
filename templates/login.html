<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In • Fitness Web App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  

  <main class="container auth">
    <section class="auth__card">
      <h1 class="auth__title">Welcome back</h1>
      <p class="auth__subtitle">Log in to access your dashboard.</p>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div style="margin-bottom:12px;">
      {% for category, msg in messages %}
        <div class="muted" style="padding:10px 12px; border:1px solid rgba(255,255,255,.08); border-radius:12px; margin-bottom:8px;">
          {{ msg }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

      <form class="form" method="post" action="{{ url_for('login') }}">
        <label class="field">
          <span class="field__label">Email</span>
          <input class="input" type="email" name="email" placeholder="you@example.com" value="{{ email }}" required>
        </label>

        <label class="field">
          <span class="field__label">Password</span>
          <input class="input" type="password" name="password" placeholder="••••••••" required>
        </label>

        <div class="form__row">
          <label class="checkbox">
            <input type="checkbox">
            <span>Remember me</span>
          </label>

          <a class="link" href="{{ url_for('forgot_password') }}">Forgot password?</a>
        </div>

        <button class="btn btn--primary btn--full" type="submit">Log In</button>
      </form>

      <p class="auth__bottom muted">
  Don't have an account? <a class="link" href="{{ url_for('register') }}">Create one</a>
</p>
    </section>
  </main>
</body>
</html>
