<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In • Fitness Web App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <!-- Top Navbar -->
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <div class="brand__logo">FW</div>
        <div class="brand__text">
          <div class="brand__name">Fitness Web App</div>
          <div class="brand__tag">Track • Progress • Stay Motivated</div>
        </div>
      </div>

      <nav class="nav">
        <a class="nav__link" href="{{ url_for('home') }}">Dashboard</a>
        <a class="nav__link" href="#">Workouts</a>
        <a class="nav__link" href="#">Diet</a>
        <a class="nav__link" href="#">Goals</a>
        <a class="nav__link" href="#">Quotes</a>
      </nav>

      <div class="topbar__actions">
        <a class="btn btn--ghost btn--active" href="{{ url_for('login') }}">Log In</a>
        <button class="btn btn--primary" type="button">Register</button>
      </div>
    </div>
  </header>

  <main class="container auth">
    <section class="auth__card">
      <h1 class="auth__title">Welcome back</h1>
      <p class="auth__subtitle">Log in to access your dashboard.</p>

      <form class="form" method="post" action="#">
        <label class="field">
          <span class="field__label">Email</span>
          <input class="input" type="email" name="email" placeholder="you@example.com" required>
        </label>

        <label class="field">
          <span class="field__label">Password</span>
          <input class="input" type="password" name="password" placeholder="••••••••" required>
        </label>

        <div class="form__row">
          <label class="checkbox">
            <input type="checkbox">
            <span>Remember me</span>
          </label>

          <a class="link" href="#">Forgot password?</a>
        </div>

        <button class="btn btn--primary btn--full" type="submit">Log In</button>
      </form>

      <p class="auth__bottom muted">
        Don’t have an account? <a class="link" href="#">Create one</a>
      </p>
    </section>
  </main>
</body>
</html>
